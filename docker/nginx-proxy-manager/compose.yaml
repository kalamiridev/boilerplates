---
services:
  app:
    image: jc21/nginx-proxy-manager:2.13.6
    container_name: nginx-proxy-manager
    ports:
      - 80:80
      - 81:81
      - 443:443
    environment:
      - TZ=Europe/Zagreb
    volumes:
      - /opt/nginx-proxy-manager/config.json:/app/config/production.json
      - /opt/nginx-proxy-manager/data:/data
      - /opt/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    restart: unless-stopped
