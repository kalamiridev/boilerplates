services:
  radarr:
    image: ghcr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    ports:
      - "7878:7878"
    security_opt:
      - apparmor:unconfined
    environment:
      TZ: Europe/Zagreb
    volumes:
      - data:/config
      - /mnt/media/movies/igrani:/movies
      - /mnt/downloads:/downloads

volumes:
  data:
    name: radarr_data
